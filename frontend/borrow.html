<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Borrow Items — LocalNest</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .categories-scroll {
      display: flex;
      overflow-x: auto;
      gap: 12px;
      padding: 20px 40px;
      background: white;
      box-shadow: var(--shadow);
      position: sticky;
      top: 70px;
      z-index: 90;
      scrollbar-width: none;
    }
    
    .categories-scroll::-webkit-scrollbar {
      display: none;
    }

    .cat-btn {
      padding: 10px 24px;
      border-radius: 30px;
      border: 1px solid #eee;
      background: #f8f9fa;
      color: #555;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cat-btn:hover {
      background: #e9ecef;
      transform: translateY(-2px);
    }

    .cat-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
    }

    .lend-layout {
      display: flex;
      max-width: 1300px;
      margin: 40px auto;
      padding: 0 24px;
      gap: 30px;
    }

    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      height: fit-content;
      position: sticky;
      top: 150px;
    }

    .filter-group {
      margin-bottom: 20px;
    }

    .filter-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      color: var(--text);
      cursor: pointer;
      margin-bottom: 10px;
    }
    
    .checkbox-label input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .lend-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    
    .lend-img-placeholder {
      height: 180px;
      background: #fff3e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--secondary);
      font-size: 3rem;
    }

    .available-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--green);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(46, 204, 113, 0.4);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .available-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 2s infinite;
    }

    .emergency-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #ff5252;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(255, 82, 82, 0.4);
      animation: shake 2s infinite;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
      20%, 40%, 60%, 80% { transform: translateX(2px); }
    }

    @media (max-width: 900px) {
      .lend-layout { flex-direction: column; }
      .sidebar { width: 100%; position: static; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo" style="cursor: pointer;" onclick="window.location.href='index.html'">Local<span>Nest</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="home.html">Browse All</a>
      <a href="housing.html">Housing</a>
      <a href="borrow.html" style="color:white; font-weight:bold;">Borrow Items</a>
      <a href="lend.html">Lend Dashboard</a>
      <a href="needs.html">Needs</a>
      <a href="emergency.html">🚨 Emergency Support</a>
      <a href="notifications.html" id="nav-notif-icon" style="display:none;">🔔 <span id="nav-notif-count" style="display:none;background:red;color:white;border-radius:50%;padding:2px 6px;font-size:0.7rem;">0</span></a>
      <a href="profile.html" id="nav-profile-link" style="display:none;">My Profile</a>
      <a href="login.html" id="nav-login" class="nav-btn">Login / Demo</a>
      <a href="#" id="nav-logout" class="nav-btn" style="display:none; background:#eee; color:#333;" onclick="logout()">Logout</a>
    </nav>
  </header>

  <div class="categories-scroll" id="categoryScroll">
    <button class="cat-btn active" onclick="setCategory('all')">🔍 All Items</button>
    <button class="cat-btn" onclick="setCategory('electronics')">💻 Electronics</button>
    <button class="cat-btn" onclick="setCategory('tools')">🔧 Tools & DIY</button>
    <button class="cat-btn" onclick="setCategory('books')">📚 Books</button>
    <button class="cat-btn" onclick="setCategory('furniture')">🪑 Furniture</button>
    <button class="cat-btn" onclick="setCategory('sports')">⚽ Sports</button>
    <button class="cat-btn" onclick="setCategory('kitchen')">🍳 Kitchen</button>
    <button class="cat-btn" onclick="setCategory('emergency')">🚨 Emergency</button>
    <button class="cat-btn" onclick="setCategory('others')">📦 Others</button>
  </div>

  <div class="lend-layout">
    
    <!-- Filter Sidebar -->
    <aside class="sidebar">
      <div class="filter-group">
        <label>Quick Filters</label>
        <label class="checkbox-label">
          <input type="checkbox" id="f-free" onchange="applyLendFilters()"> Free to borrow
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="f-today" onchange="applyLendFilters()"> Available Today
        </label>
      </div>

      <div class="filter-group">
        <label>Distance Limit</label>
        <select id="f-distance" onchange="applyLendFilters()">
          <option value="50" selected>Any distance</option>
          <option value="3">Within 3 km</option>
          <option value="5">Within 5 km</option>
          <option value="10">Within 10 km</option>
          <option value="15">Within 15 km</option>
        </select>
      </div>

      <button class="btn btn-outline" style="width:100%; border-color:var(--primary); color:var(--primary); margin-top:20px;" onclick="detectLocationAndFilter()">
        📍 Detect My Location
      </button>
      
      <div style="background:#fff8f0; padding:16px; border-radius:8px; margin-top:24px; border:1px solid #ffe0b2;">
        <h4 style="color:#e65100; margin-bottom:8px;">Need something specific?</h4>
        <p style="font-size:0.85rem; color:#555; margin-bottom:12px;">Can't find what you're looking for? Ask your neighbors!</p>
        <a href="needs.html" class="btn btn-primary" style="display:block; text-align:center; padding:10px;">Post a Request</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h2 id="resultsInfo" style="font-size: 1.2rem; color: var(--dark);">Showing all items...</h2>
        <div style="font-size: 0.9rem; color: var(--muted);" id="locationStatus">Location not detected</div>
      </div>

      <div class="listings-grid" id="listingsGrid">
        <div class="loading">⏳ Loading items...</div>
      </div>
    </main>

  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" onclick="handleOverlayClick(event)"></div>
  <div class="toast" id="toast"></div>

  <!-- Shared JS and specific Borrow JS -->
  <script src="js/app.js"></script>
  <script src="js/borrow.js"></script>

</body>
</html>
